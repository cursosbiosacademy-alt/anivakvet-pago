  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"03440bbf-1100-49c7-9009-0c335ae54a34\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e9febd18-f888-4389-965f-5abcbea67579\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e559d8c5-ee31-4e83-a56e-0d3601b024c5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"31d48cd1-bc47-4de9-bd0a-10016bebaf74\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"03440bbf-1100-49c7-9009-0c335ae54a34\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --bg:#eef0f5;\n    --card:#ffffff;\n    --border:#e7e9f1;\n    --navy:#1A1A3E;\n    --grey:#54586f;\n    --grey-light:#8a8ea3;\n    --orange:#ff8c00;\n    --radius:18px;\n    --grad:linear-gradient(90deg,#ff8c00 0%,#7ed321 20%,#00c853 38%,#00b8d4 58%,#1565c0 78%,#e91e8c 100%);\n    --shadow:0 4px 18px rgba(26,26,62,.06);\n    --shadow-hover:0 10px 30px rgba(26,26,62,.12);\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{-webkit-text-size-adjust:100%}\n  body{\n    font-family:'Plus Jakarta Sans',system-ui,sans-serif;\n    background:var(--bg);\n    color:var(--navy);\n    line-height:1.55;\n    -webkit-font-smoothing:antialiased;\n  }\n  .gradient-bar{height:5px;background:var(--grad);width:100%;position:sticky;top:0;z-index:50}\n  .shell{max-width:480px;margin:0 auto;padding:0 18px 56px}\n\n  /* ---------- Header logo ---------- */\n  .logo-wrap{text-align:center;padding:24px 0 4px}\n  .logo-wrap img{height:62px;width:auto}\n\n  /* ---------- Cards ---------- */\n  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}\n  .section{margin-top:18px}\n  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--grey-light);display:flex;align-items:center;gap:8px;margin-bottom:13px}\n  .eyebrow::before{content:\"\";width:18px;height:3px;border-radius:3px;background:var(--grad)}\n  .section-title{font-size:20px;font-weight:700;letter-spacing:-.01em;margin-bottom:3px}\n\n  /* ---------- Course hero ---------- */\n  .course-hero{padding:24px 20px 22px;margin-top:8px;text-align:center;position:relative;overflow:hidden}\n  .course-hero::before{content:\"\";position:absolute;inset:0 0 auto 0;height:5px;background:var(--grad)}\n  .pill{\n    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;\n    color:#fff;padding:6px 14px;border-radius:30px;background:var(--navy);margin-bottom:14px;\n  }\n  .course-hero h1{font-size:26px;line-height:1.18;font-weight:800;letter-spacing:-.01em;text-wrap:balance;margin-bottom:14px}\n  .course-meta{display:flex;flex-direction:column;gap:9px;align-items:center;margin-bottom:6px}\n  .course-meta .row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--grey);font-weight:600}\n  .course-meta .row .av{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;background:var(--navy)}\n  .course-meta .row .ic{font-size:15px}\n  .course-meta .row strong{color:var(--navy)}\n  .course-sub{font-size:13.5px;color:var(--grey);margin-top:14px;display:inline-flex;align-items:center;gap:7px;font-weight:600}\n  .course-sub .live{display:inline-flex;align-items:center;gap:6px;color:#e91e8c}\n  .course-sub .live::before{content:\"\";width:8px;height:8px;border-radius:50%;background:#e91e8c;animation:pulse 1.6s infinite}\n  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}\n\n  /* ---------- Country selector ---------- */\n  .country-card{padding:18px 16px 16px;margin-top:18px}\n  .country-card .lead{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:7px}\n  .country-card .lead .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex:none;box-shadow:0 0 0 4px rgba(255,140,0,.15)}\n  .flags{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}\n  .flag-btn{\n    appearance:none;cursor:pointer;background:#f7f8fb;border:1.5px solid var(--border);border-radius:14px;\n    padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:4px;\n    font-family:inherit;transition:transform .15s ease,border-color .15s ease,background .15s ease,box-shadow .15s ease;\n  }\n  .flag-btn .flag{font-size:25px;line-height:1}\n  .flag-btn .name{font-size:10.5px;font-weight:600;color:var(--grey)}\n  .flag-btn:hover{transform:translateY(-2px);border-color:#d6d9e6}\n  .flag-btn.active{border-color:var(--orange);background:#fff;box-shadow:0 0 0 3px rgba(255,140,0,.16),var(--shadow);transform:translateY(-2px)}\n  .flag-btn.active .name{color:var(--navy);font-weight:700}\n\n  /* ---------- Price block ---------- */\n  .price-card{padding:24px 20px 20px;margin-top:14px;text-align:center;position:relative;overflow:hidden}\n  .price-card::before{content:\"\";position:absolute;inset:0 0 auto 0;height:5px;background:var(--grad)}\n  .price-label{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--grey-light);margin-bottom:8px}\n  .price-amount{font-size:46px;font-weight:800;letter-spacing:-.02em;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .price-amount.placeholder{font-size:18px;font-weight:700;background:none;color:var(--grey);-webkit-text-fill-color:initial;line-height:1.4}\n  .price-note{font-size:13px;font-weight:600;color:var(--navy);margin-top:12px}\n  .tax-note{display:flex;gap:8px;align-items:flex-start;text-align:left;font-size:11.5px;line-height:1.5;color:var(--grey);background:#f7f8fb;border:1px solid var(--border);border-radius:13px;padding:11px 12px;margin-top:16px}\n  .tax-note .ic{flex:none;font-size:13px;line-height:1.3;margin-top:1px}\n  .price-discount{font-size:12px;color:var(--grey-light);margin-top:11px}\n\n  /* ---------- Promo mode ---------- */\n  .promo-pill{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.06em;color:#fff;padding:7px 15px;border-radius:30px;background:var(--orange);margin-bottom:11px;box-shadow:0 4px 12px rgba(255,140,0,.32)}\n  .countdown{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:700;color:#b34700;background:#fff5e8;border:1px solid #ffe2bd;border-radius:11px;padding:8px 12px;margin-bottom:14px}\n  .countdown #cdTime{font-variant-numeric:tabular-nums;font-weight:800;color:var(--navy);letter-spacing:.02em}\n  .price-original{font-size:18px;font-weight:700;color:var(--grey-light);text-decoration:line-through;text-decoration-color:#c9ccda argin-top:2px;margin-bottom:14px}\n  .cash-highlight{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:#0a8a3f;background:linear-gradient(90deg,rgba(0,200,83,.12),rgba(0,200,83,0));border:1px solid #bfe9cf;border-radius:13px;padding:11px 13px;margin-bottom:13px}\n  .pm-list{list-style:none;display:flex;flex-direction:column;gap:1px}\n  .pm-list li{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:var(--navy);padding:9px 2px}\n  .pm-list li + li{border-top:1px solid var(--border)}\n  .pm-list li .chk{flex:none;width:20px;height:20px;border-radius:50%;background:#00c853;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800}\n  .pm-secure{display:flex;gap:9px;align-items:flex-start;margin-top:15px;padding-top:14px;border-top:1px solid var(--border)}\n  .pm-secure .ic{flex:none;font-size:15px;margin-top:1px}\n  .pm-secure p{font-size:11.5px;line-height:1.5;color:var(--grey)}\n  .pm-secure p strong{color:var(--navy)}\n\n  /* ---------- Primary CTA ---------- */\n  .btn-pay{\n    appearance:none;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:9px;\n    background:var(--orange);color:#fff;font-family:inherit;font-weight:700;font-size:17px;\n    border:none;border-radius:14px;padding:16px;width:100%;letter-spacing:.01em;\n    box-shadow:0 6px 18px rgba(255,140,0,.34);transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;\n  }\n  .btn-pay:hover{filter:brightness(1.04);box-shadow:0 9px 24px rgba(255,140,0,.44);transform:translateY(-1px)}\n  .btn-pay:active{transform:translateY(0)}\n  .btn-pay .arrow{font-size:18px}\n  .cta-secure{display:flex;align-items:center;justify-content:center;gap:7px;font-size:11.5px;color:var(--grey-light);margin-top:11px;font-weight:600}\n  .cta-secure img{height:15px;width:auto;opacity:.95}\n\n  /* ---------- Cómo funciona ---------- */\n  .how-list{list-style:none;display:flex;flex-direction:column;gap:2px}\n "Tarjeta de crédito/débito\",\"PayPal\"]},\n    {code:\"gt\", flag:\"🇬🇹\", name:\"Guatemala\",  price:\"Q360 GTQ\",     promo:\"Q288 GTQ\",     schedule:\"8:00 PM a 10:00 PM\",  cash:false, cuotas:false, methods:[\"Tarjeta de crédito/débito\",\"PayPal\"]}\n  ];\n\n  // ---- Pick course from ?curso= ----\n  function initials(name){\n    const m=name.replace(/^M\\.?\\s*MVZ\\.?|^MVZ\\.?/i,'').trim().match(/([A-ZÁÉÍÓÚÑ])/g)||[];\n    // Use first letters of the two main name words (skip titles)\n    const parts=name.replace(/M\\.?\\s*MVZ\\.?|MVZ\\.?|M\\.?\\s*en\\s*C\\.?/gi,'').trim().split(/\\s+/).filter(Boolean);\n    if(parts.length>=2) return (parts[0][0]+parts[1][0]).toUpperCase();\n    return (m.slice(0,2).join('')||'AV');\n  }\n  const params=new URLSearchParams(location.search);\n  let key=(params.get('curso')||'').toLowerCase();\n  if(!CURSOS[key]) key='felinos-silvestres';\n  const curso=CURSOS[key];\n  const PROMO=params.get('promo')==='1';\n  const PROMO_CODE='ANIVAK20';\n\n  document.getElementById('coursePill').textContent=curso.etiqueta;\n  document.getElementById('courseName').textContent=curso.nombre;\n  document.getElementById('coursePonente').textContent=curso.ponente;\n  document.getElementById('courseFechas').textContent=curso.fechas;\n  document.getElementById('courseInitials').textContent=initials(curso.ponente);\n  document.getElementById('finalTitle').textContent='Asegura tu lugar en '+curso.etiqueta.charAt(0)+curso.etiqueta.slice(1).toLowerCase();\n  document.title='ANIVAKVET — '+curso.nombre;\n  document.getElementById('ctaTop').href=curso.hotmart;\n  document.getElementById('ctaBottom').href=curso.hotmart;\n\n  // ---- Toast helper ----\n  const toast=document.getElementById('toast');\n  let toastTimer=null;\n  function showToast(msg){\n    toast.textContent=msg;\n    toast.classList.add('show');\n    clearTimeout(toastTimer);\n    toastTimer=setTimeout(()=>toast.classList.remove('show'),4200);\n  }\n  function copyCode(){\n    const t=PROMO_CODE;\n    if(navigator.clipboard&&navigator.clipboard.writeText){\n      navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t));\n    }else{fallbackCopy(t);}\n  }\n  function fallbackCopy(t){\n    try{const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}catch(e){}\n  }\n\n  // ---- Promo mode ----\n  if(PROMO){\n    document.getElementById('promoPill').style.display='inline-block';\n    document.getElementById('countdown').style.display='flex';\n    document.getElementById('promoCode').style.display='block';\n    document.getElementById('priceDiscount').style.display='none';\n\n    // copy button\n    const copyBtn=document.getElementById('copyCode');\n    copyBtn.addEventListener('click',()=>{\n      copyCode();\n      copyBtn.textContent='¡Copiado!';\n      copyBtn.classList.add('copied');\n      showToast('✅ Copiado: '+PROMO_CODE);\n      setTimeout(()=>{copyBtn.textContent='Copiar';copyBtn.classList.remove('copied');},2200);\n    });\n\n    // CTA: copy code + notice + open Hotmart (link opens via anchor default)\n    [document.getElementById('ctaTop'),document.getElementById('ctaBottom')].forEach(a=>{\n      a.addEventListener('click',()=>{\n        copyCode();\n        showToast(\"✅ Copiamos tu código \"+PROMO_CODE+\" — pégalo en el campo 'Cupón' al pagar\");\n      });\n    });\n\n    // countdown to midnight America/Mexico_City\n    const cdTime=document.getElementById('cdTime');\n    function mxRemainingSeconds(){\n      const fmt=new Intl.DateTimeFormat('en-US',{timeZone:'America/Mexico_City',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});\n      const p=fmt.formatToParts(new Date());\n      let h=+p.find(x=>x.type==='hour').value%24;\n      const m=+p.find(x=>x.type==='minute').value;\n      const s=+p.find(x=>x.type==='second').value;\n      return Math.max(0,86400-(h*3600+m*60+s));\n    }\n    function tick(){\n      let r=mxRemainingSeconds();\n      const h=String(Math.floor(r/3600)).padStart(2,'0');\n      const m=String(Math.floor((r%3600)/60)).padStart(2,'0');\n      const s=String(r%60).padStart(2,'0');\n      cdTime.textContent=h+':'+m+':'+s;\n    }\n    tick();\n    setInterval(tick,1000);\n  }\n\n  // ---- Render flags ----\n  const flagsEl=document.getElementById('flags');\n  COUNTRIES.forEach(c=>{\n    const b=document.createElement('button');\n    b.className='flag-btn';\n    b.dataset.code=c.code;\n    b.innerHTML=`<span class=\"flag\">${c.flag}<\u002Fspan><span class=\"name\">${c.name}<\u002Fspan>`;\n    b.addEventListener('click',()=>selectCountry(c.code));\n    flagsEl.appendChild(b);\n  });\n\n  // ---- Selection logic ----\n  const priceAmount=document.getElementById('priceAmount');\n  const priceOriginal=document.getElementById('priceOriginal');\n  const liveTime=document.getElementById('liveTime');\n  const payMethods=document.getElementById('payMethods');\n  const pmCountry=document.getElementById('pmCountry');\n  const pmList=document.getElementById('pmList');\n  const cashHighlight=document.getElementById('cashHighlight');\n  const installPill=document.getElementById('installPill');\n  function selectCountry(code){\n    const c=COUNTRIES.find(x=>x.code===code);\n    if(!c) return;\n    document.querySelectorAll('.flag-btn').forEach(b=>b.classList.toggle('active',b.dataset.code===code));\n    if(PROMO){\n      priceOriginal.textContent=c.price;\n      priceOriginal.style.display='block';\n      priceAmount.textContent=c.promo;\n    }else{\n      priceOriginal.style.display='none';\n      priceAmount.textContent=c.price;\n    }\n    priceAmount.classList.remove('placeholder');\n    liveTime.textContent=c.schedule+' (hora local)';\n\n    // installments pill\n    installPill.classList.toggle('show',!!c.cuotas);\n\n    // payment methods card\n    pmCountry.textContent=c.name;\n    pmList.innerHTML=c.methods.map(m=>`<li><span class=\"chk\">✓<\u002Fspan>${m}<\u002Fli>`).join('');\n    cashHighlight.style.display=c.cash?'flex':'none';\n    payMethods.style.display='block';\n\n    try{localStorage.setItem('anivak_country',code);}catch(e){}\n  }\n  try{\n    const saved=localStorage.getItem('anivak_country');\n    if(saved && COUNTRIES.some(c=>c.code===saved)) selectCountry(saved);\n  }catch(e){}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
