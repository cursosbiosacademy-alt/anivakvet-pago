document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#eef0f5;\n    --card:#ffffff;\n    --surface:#f6f7fa;\n    --ink:#1a1a3e;\n    --ink-2:#54586f;\n    --ink-3:#8a8ea3;\n    --line:#e7e9f1;\n    --line-strong:#d7dae6;\n    --mp:#2553d6;        /* mercado pago azul */\n    --mp-dark:#1c41ab;\n    --wa:#1faf54;        /* whatsapp verde, calmado */\n    --wa-dark:#178744;\n    --ok:#0a8f54;\n    --warn-bg:#fff6e8;\n    --warn-line:#f4d49a;\n    --warn-ink:#8a5a08;\n    --radius:18px;\n    --radius-sm:12px;\n    --shadow:0 1px 2px rgba(26,26,62,.05), 0 10px 30px -12px rgba(26,26,62,.16);\n    --shadow-sm:0 1px 2px rgba(26,26,62,.06);\n    --rainbow:linear-gradient(90deg,#ff8c00,#7ed321,#00c853,#00b8d4,#1565c0,#e91e8c);\n    --font:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html{-webkit-text-size-adjust:100%;}\n  body{\n    font-family:var(--font);\n    background:var(--bg);\n    color:var(--ink);\n    line-height:1.5;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n  }\n  .rainbow-top{height:4px;background:var(--rainbow);}\n  /* shell ----------------------------------------------------------------*/\n  .shell{\n    max-width:480px;\n    margin:0 auto;\n    background:var(--surface);\n    min-height:100vh;\n    box-shadow:0 0 0 1px var(--line),0 40px 80px -40px rgba(26,26,62,.35);\n  }\n  @media (min-width:520px){ .shell{margin-top:0;} }\n  .pad{padding:0 20px;}\n\n  /* header ---------------------------------------------------------------*/\n  header{\n    background:var(--card);\n    border-bottom:1px solid var(--line);\n    padding:16px 20px 14px;\n    display:flex;align-items:center;justify-content:space-between;gap:12px;\n    position:sticky;top:0;z-index:30;\n  }\n  header img{height:34px;width:auto;display:block;}\n  .secure-pill{\n    display:inline-flex;align-items:center;gap:6px;\n    font-size:12px;font-weight:600;color:var(--ok);\n    background:#e9f7ef;border:1px solid #c7ebd6;\n    padding:6px 10px;border-radius:999px;white-space:nowrap;\n  }\n  .secure-pill svg{width:13px;height:13px;}\n\n  /* hero -----------------------------------------------------------------*/\n  .hero{padding:30px 20px 22px;text-align:center;}\n  .eyebrow{\n    font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n    color:var(--ink-3);margin-bottom:12px;\n  }\n  .hero h1{\n    font-size:27px;line-height:1.18;font-weight:800;letter-spacing:-.02em;\n    text-wrap:balance;\n  }\n  .hero p{\n    margin-top:10px;color:var(--ink-2);font-size:15.5px;\n    max-width:34ch;margin-left:auto;margin-right:auto;text-wrap:pretty;\n  }\n\n  /* price card -----------------------------------------------------------*/\n  .price{\n    margin:22px 20px 0;\n    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);\n    box-shadow:var(--shadow);overflow:hidden;\n  }\n  .price-main{\n    display:flex;align-items:center;justify-content:space-between;gap:14px;\n    padding:18px 18px 16px;\n  }\n  .price-main .lbl{font-size:13px;font-weight:600;color:var(--ink-2);}\n  .price-main .amt{font-size:34px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}\n  .price-main .amt i{font-style:normal;}\n  .price-main .amt span{font-size:15px;font-weight:600;color:var(--ink-3);margin-left:3px;}\n  .price-split{\n    border-top:1px dashed var(--line-strong);\n    padding:13px 18px;background:var(--surface);\n    font-size:13.5px;color:var(--ink-2);display:flex;gap:9px;align-items:flex-start;\n  }\n  .price-split b{color:var(--ink);font-weight:700;}\n  .price-split .dot{flex:none;width:18px;height:18px;border-radius:50%;background:#eae7fb;color:#5b46c9;\n    display:grid;place-items:center;font-size:11px;font-weight:800;margin-top:1px;}\n\n  /* section heads --------------------------------------------------------*/\n  .sec-head{padding:30px 20px 4px;}\n  .sec-head .kicker{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}\n  .sec-head h2{font-size:20px;font-weight:800;letter-spacing:-.015em;margin-top:4px;}\n  .sec-head p{font-size:14px;color:var(--ink-2);margin-top:5px;text-wrap:pretty;}\n\n  /* trust strip ----------------------------------------------------------*/\n  .trust{\n    margin:14px 20px 0;background:var(--card);border:1px solid var(--line);\n    border-radius:var(--radius);padding:16px 16px 14px;box-shadow:var(--shadow-sm);\n  }\n  .trust-row{display:flex;gap:11px;align-items:flex-start;}\n  .trust-row .ic{flex:none;width:34px;height:34px;border-radius:10px;background:#e9f7ef;color:var(--ok);display:grid;place-items:center;}\n  .trust-row .ic svg{width:18px;height:18px;}\n  .trust-row .tx{font-size:13.5px;color:var(--ink-2);line-height:1.45;}\n  .trust-row .tx b{color:var(--ink);font-weight:700;}\n  .methods{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line);}\n  .chip{\n    font-size:11.5px;font-weight:600;color:var(--ink-2);\n    background:var(--surface);border:1px solid var(--line-strong);\n    padding:6px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;\n  }\n  .chip .sw{width:14px;height:9px;border-radius:2px;}\n\n  /* options --------------------------------------------------------------*/\n  #opciones{display:flex;flex-direction:column;gap:16px;padding:14px 20px 0;}\n  .opt{\n    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);\n    box-shadow:var(--shadow);overflow:hidden;position:relative;\n  }\n  .opt.featured{border-color:#c9d4f6;box-shadow:0 1px 2px rgba(37,83,214,.08),0 16px 40px -18px rgba(37,83,214,.35);}\n  .opt .accent-line{height:4px;background:var(--rainbow);}\n  .opt.solid-accent .accent-line{background:var(--mp);}\n  .opt-body{padding:18px;}\n  .opt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}\n  .opt-num{\n    font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;\n    color:var(--ink-3);\n  }\n  .opt h3{font-size:18px;font-weight:800;letter-spacing:-.01em;margin-top:3px;}\n  .mp-logo{height:24px;width:auto;display:block;margin-top:5px;}\n  .titular{font-size:17px;letter-spacing:.005em;}\n  .opt .sub{font-size:13px;color:var(--ink-2);margin-top:2px;}\n  .badge-rec{\n    flex:none;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;\n    background:var(--rainbow);padding:6px 11px;border-radius:999px;white-space:nowrap;\n    box-shadow:0 4px 12px -4px rgba(233,30,140,.5);\n  }\n  .solid-accent .badge-rec{background:var(--mp);box-shadow:0 4px 12px -4px rgba(37,83,214,.5);}\n  .opt-desc{font-size:14px;color:var(--ink-2);margin-top:13px;line-height:1.5;text-wrap:pretty;}\n  .opt-desc b{color:var(--ink);font-weight:700;}\n\n  /* MP buttons */\n  .pay-btns{display:flex;flex-direction:column;gap:10px;margin-top:16px;}\n  .btn{\n    display:flex;align-items:center;justify-content:center;gap:8px;\n    border:none;cursor:pointer;text-decoration:none;\n    font-family:inherit;font-size:15px;font-weight:700;\n    padding:15px 16px;border-radius:13px;min-height:52px;white-space:nowrap;\n    transition:transform .12s ease,box-shadow .12s ease,background .12s ease;\n  }\n  .btn .lbl2{font-weight:700;}\n  .btn:active{transform:translateY(1px) scale(.995);}\n  .btn-mp{background:var(--mp);color:#fff;box-shadow:0 8px 18px -8px rgba(37,83,214,.6);}\n  .btn-mp:hover{background:var(--mp-dark);}\n  .amt2{white-space:nowrap;}\n  .btn-mp .amt2{margin-left:auto;font-variant-numeric:tabular-nums;}\n  .btn-mp-outline{background:#fff;color:var(--mp);border:1.5px solid #c9d4f6;}\n  .btn-mp-outline:hover{background:#f3f6fe;}\n  .btn-mp-outline .amt2{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--ink-2);}\n  .btn .arrow{opacity:.85;}\n  .info-send{display:flex;gap:10px;align-items:flex-start;background:#f1f5fe;border:1px solid #d3e0fb;border-radius:12px;padding:11px 13px;margin-top:14px;}\n  .info-send svg{flex:none;width:17px;height:17px;color:var(--mp);margin-top:1px;}\n  .info-send p{font-size:12.5px;color:var(--ink-2);line-height:1.45;}\n  .info-send p b{color:var(--ink);font-weight:700;}\n  .mp-foot{\n    display:flex;align-items:center;gap:7px;justify-content:center;\n    margin-top:13px;font-size:12px;color:var(--ink-3);font-weight:600;\n  }\n  .mp-foot svg{width:13px;height:13px;}\n\n  /* BanCoppel */\n  .warn{\n    display:flex;gap:10px;align-items:flex-start;\n    background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:12px;\n    padding:12px 13px;margin-top:14px;\n  }\n  .warn svg{flex:none;width:18px;height:18px;color:var(--warn-ink);margin-top:1px;}\n  .warn p{font-size:13px;color:var(--warn-ink);line-height:1.45;}\n  .warn p b{font-weight:800;}\n  .fields{margin-top:14px;display:flex;flex-direction:column;gap:1px;border:1px solid var(--line);border-radius:13px;overflow:hidden;}\n  .field{padding:12px 14px;background:var(--card);}\n  .field+.field{border-top:1px solid var(--line);}\n  .field .k{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);}\n  .field .v-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:3px;}\n  .field .v{font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.01em;}\n  .field .v.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.02em;}\n  .field .hint{font-size:11.5px;color:var(--ink-3);margin-top:3px;}\n  .copy{\n    flex:none;display:inline-flex;align-items:center;gap:5px;cursor:pointer;\n    font-family:inherit;font-size:12px;font-weight:700;color:var(--mp);\n    background:#f3f6fe;border:1px solid #d8e2fb;border-radius:9px;padding:7px 10px;\n    transition:.12s ease;white-space:nowrap;\n  }\n  .copy:hover{background:#e9f0fe;}\n  .copy.done{color:var(--ok);background:#e9f7ef;border-color:#c7ebd6;}\n  .copy svg{width:13px;height:13px;}\n  .oxxo-note{\n    display:flex;gap:8px;align-items:flex-start;margin-top:13px;\n    font-size:12px;color:var(--ink-3);line-height:1.45;\n  }\n  .oxxo-note svg{flex:none;width:14px;height:14px;margin-top:1px;}\n\n  /* complete-payment section --------------------------------------------*/\n  .complete{margin:16px 20px 0;background:#f1f5fe;border:1px solid #d3e0fb;border-radius:var(--radius);padding:18px;}\n  .complete .top{display:flex;gap:12px;align-items:flex-start;}\n  .complete .ic{flex:none;width:40px;height:40px;border-radius:11px;background:#fff;border:1px solid #d3e0fb;color:var(--mp);display:grid;place-items:center;}\n  .complete .ic svg{width:21px;height:21px;}\n  .complete h3{font-size:16.5px;font-weight:800;letter-spacing:-.01em;}\n  .complete p{font-size:13.5px;color:var(--ink-2);margin-top:3px;line-height:1.5;text-wrap:pretty;}\n  .complete p b{color:var(--ink);font-weight:700;}\n  .complete .btn{margin-top:15px;}\n\n  /* steps ----------------------------------------------------------------*/\n  .steps{margin:14px 20px 0;display:flex;flex-direction:column;gap:0;\n    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);\n    padding:6px 4px;box-shadow:var(--shadow-sm);}\n  .step{display:flex;gap:14px;align-items:flex-start;padding:14px 14px;position:relative;}\n  .step+.step{border-top:1px solid var(--line);}\n  .step .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;\n    display:grid;place-items:center;font-size:14px;font-weight:800;}\n  .step .st{font-size:14.5px;color:var(--ink);line-height:1.45;}\n  .step .st b{font-weight:800;}\n  .step .st span{display:block;color:var(--ink-2);font-size:13px;font-weight:500;margin-top:2px;}\n\n  /* whatsapp instruction --------------------------------------------------*/\n  .wa-wrap{padding:22px 20px 8px;}\n  .wa-card{display:flex;gap:13px;align-items:flex-start;\n    background:#eafaf0;border:1px solid #c4ecd3;border-radius:var(--radius);padding:18px;}\n  .wa-ic{flex:none;width:42px;height:42px;border-radius:12px;background:var(--wa);color:#fff;display:grid;place-items:center;}\n  .wa-ic svg{width:23px;height:23px;}\n  .wa-card h3{font-size:16px;font-weight:800;letter-spacing:-.01em;color:var(--ink);}\n  .wa-card p{font-size:13.5px;color:var(--ink-2);margin-top:4px;line-height:1.5;text-wrap:pretty;}\n  .wa-card p b{color:var(--ink);font-weight:700;}\n\n  /* footer ---------------------------------------------------------------*/\n  footer{margin-top:24px;padding:24px 20px 40px;border-top:1px solid var(--line);background:var(--card);}\n  .foot-notes{display:flex;flex-direction:column;gap:9px;}\n  .foot-note{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);line-height:1.45;}\n  .foot-note svg{flex:none;width:15px;height:15px;color:var(--ink-3);margin-top:1px;}\n  .foot-brand{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;}\n  .foot-brand img{height:24px;opacity:.95;}\n  .foot-brand small{font-size:11px;color:var(--ink-3);}\n\n  /* tweaks panel ---------------------------------------------------------*/\n  #twk{position:fixed;right:14px;bottom:14px;z-index:99999;width:248px;display:none;\n    background:#fff;border:1px solid var(--line-strong);border-radius:14px;\n    box-shadow:0 18px 50px -14px rgba(26,26,62,.5);overflow:hidden;font-size:12px;}\n  #twk.on{display:block;}\n  #twk .h{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border-bottom:1px solid var(--line);}\n  #twk .h b{font-size:12.5px;font-weight:800;}\n  #twk .h button{border:none;background:transparent;font-size:15px;cursor:pointer;color:var(--ink-3);line-height:1;}\n  #twk .b{padding:12px;display:flex;flex-direction:column;gap:14px;}\n  #twk label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:7px;}\n  .seg{display:flex;background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;padding:3px;gap:3px;}\n  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink-2);padding:8px 6px;border-radius:7px;cursor:pointer;line-height:1.2;}\n  .seg button.sel{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);}\n\n  /* course header --------------------------------------------------------*/\n  .course-date{display:inline-flex;align-items:center;gap:7px;margin-top:14px;\n    font-size:13.5px;font-weight:600;color:var(--ink-2);\n    background:var(--card);border:1px solid var(--line);padding:8px 13px;border-radius:999px;}\n  .course-date svg{width:15px;height:15px;color:var(--mp);flex:none;}\n  .started-flag{display:none;align-items:center;gap:7px;margin-top:12px;\n    font-size:12.5px;font-weight:700;color:var(--warn-ink);\n    background:var(--warn-bg);border:1px solid var(--warn-line);padding:7px 12px;border-radius:999px;}\n  .started-flag svg{width:14px;height:14px;flex:none;}\n  .apart-hint{font-size:12.5px;color:var(--ink-3);margin-top:11px;text-align:center;line-height:1.45;}\n  .apart-hint b{color:var(--ink-2);font-weight:700;}\n\n  /* no-curso state -------------------------------------------------------*/\n  .no-curso{display:none;min-height:100vh;align-items:center;justify-content:center;padding:30px 20px;}\n  .nc-card{max-width:400px;width:100%;background:var(--card);border:1px solid var(--line);\n    border-radius:var(--radius);box-shadow:var(--shadow);padding:34px 26px 30px;text-align:center;}\n  .nc-card>img{height:30px;margin:0 auto 22px;display:block;}\n  .nc-card h1{font-size:21px;font-weight:800;letter-spacing:-.02em;text-wrap:balance;}\n  .nc-card p{font-size:14.5px;color:var(--ink-2);margin-top:9px;line-height:1.5;text-wrap:pretty;}\n  .nc-list{display:flex;flex-direction:column;gap:9px;margin-top:22px;text-align:left;}\n  .nc-item{display:flex;align-items:center;gap:13px;text-decoration:none;\n    background:var(--card);border:1px solid var(--line-strong);border-radius:14px;\n    padding:14px 15px;transition:border-color .12s ease,box-shadow .12s ease,transform .12s ease;}\n  .nc-item:hover{border-color:#c9d4f6;box-shadow:0 8px 22px -12px rgba(37,83,214,.4);}\n  .nc-item:active{transform:translateY(1px);}\n  .nc-item .nc-mark{flex:none;width:38px;height:38px;border-radius:11px;background:var(--surface);\n    border:1px solid var(--line);display:grid;place-items:center;\n    font-weight:800;font-size:15px;color:var(--ink);}\n  .nc-item .nc-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}\n  .nc-item .nc-nm{display:block;font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;letter-spacing:-.01em;}\n  .nc-item .nc-meta{display:block;font-size:12px;color:var(--ink-3);font-weight:500;}\n  .nc-item .nc-price{flex:none;font-size:14px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;}\n  .nc-item .nc-arrow{flex:none;color:var(--ink-3);}\n  .nc-item .nc-arrow svg{width:18px;height:18px;display:block;}\n  .nc-hint{font-size:12.5px;color:var(--ink-3);margin-top:20px;padding-top:17px;\n    border-top:1px solid var(--line);line-height:1.5;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- PREVIEW BAR (solo fuera de producción) -->\n<div id=\"previewBar\" style=\"display:none;position:sticky;top:0;z-index:9999;background:#1a1a3e;color:#fff;padding:8px 12px;font:600 12px/1.2 'Plus Jakarta Sans',sans-serif;align-items:center;gap:9px;\">\n  <span style=\"opacity:.7;letter-spacing:.04em;text-transform:uppercase;font-size:10.5px;\">Vista previa<\u002Fspan>\n  <select id=\"previewSel\" style=\"flex:1;font:inherit;color:#1a1a3e;background:#fff;border:none;border-radius:8px;padding:8px 10px;\"><\u002Fselect>\n  <span style=\"opacity:.55;font-size:10.5px;\">no se ve en producción<\u002Fspan>\n<\u002Fdiv>\n<div class=\"rainbow-top\"><\u002Fdiv>\n<!-- NO CURSO ----------------------------------------------------------- -->\n<div class=\"no-curso\" id=\"noCurso\">\n  <div class=\"nc-card\">\n    <img src=\"16123008-cc3b-4b50-ba0e-4ddb97f6aaa1\" alt=\"ANIVAKVET\">\n    <h1>¿Qué curso vas a pagar?<\u002Fh1>\n    <p>Elige tu curso para abrir su página de pago con el precio y los métodos correctos.<\u002Fp>\n    <div class=\"nc-list\" id=\"ncList\"><\u002Fdiv>\n    <div class=\"nc-hint\">¿No ves tu curso o tienes dudas? <b style=\"color:var(--ink-2)\">Escríbenos por WhatsApp<\u002Fb> y con gusto te ayudamos.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"shell\" id=\"app\" style=\"display:none\">\n\n  <header>\n    <img src=\"16123008-cc3b-4b50-ba0e-4ddb97f6aaa1\" alt=\"ANIVAKVET\">\n    <span class=\"secure-pill\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n      Pago seguro\n    <\u002Fspan>\n  <\u002Fheader>\n\n  <section class=\"hero\">\n    <div class=\"eyebrow\">Pago de tu curso<\u002Fdiv>\n    <h1 id=\"courseName\">Tu curso<\u002Fh1>\n    <div class=\"course-date\" id=\"courseDate\"><\u002Fdiv>\n    <div class=\"started-flag\" id=\"startedFlag\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n      Este curso ya inició — paga completo para conservar tu acceso\n    <\u002Fdiv>\n    <p class=\"lead\">Elige el método que prefieras. Tu lugar queda apartado en cuanto confirmamos tu pago.<\u002Fp>\n  <\u002Fsection>\n\n  <div class=\"price\">\n    <div class=\"price-main\">\n      <div class=\"lbl\">Costo del curso<br>pago completo<\u002Fdiv>\n      <div class=\"amt\">$<i id=\"priceAmt\">600<\u002Fi><span>MXN<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"price-split\" id=\"priceSplit\">\n      <span class=\"dot\">o<\u002Fspan>\n      <div><b>Aparta tu lugar con $<span id=\"splitApart\">200<\u002Fspan> MXN<\u002Fb> y completa los $<span id=\"splitResto\">400<\u002Fspan> restantes el día de inicio.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TRUST ------------------------------------------------------------ -->\n  <div class=\"sec-head\">\n    <div class=\"kicker\">Confianza<\u002Fdiv>\n    <h2>Tu pago es 100% seguro<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"trust\">\n    <div class=\"trust-row\">\n      <span class=\"ic\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <div class=\"tx\">Procesamos con <b>Mercado Pago<\u002Fb>, la plataforma de pagos más usada de México, con <b>protección al comprador<\u002Fb>. Paga con tarjeta, transferencia o efectivo — <b>sin crear cuenta<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"methods\">\n      <span class=\"chip\"><span class=\"sw\" style=\"background:linear-gradient(90deg,#1a1f71,#2557d6)\"><\u002Fspan>Visa<\u002Fspan>\n      <span class=\"chip\"><span class=\"sw\" style=\"background:linear-gradient(90deg,#eb001b,#f79e1b)\"><\u002Fspan>Mastercard<\u002Fspan>\n      <span class=\"chip\">Débito / Crédito<\u002Fspan>\n      <span class=\"chip\">SPEI<\u002Fspan>\n      <span class=\"chip\">Efectivo OXXO<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- OPTIONS ----------------------------------------------------------- -->\n  <div class=\"sec-head\">\n    <div class=\"kicker\">Métodos de pago<\u002Fdiv>\n    <h2>Elige cómo quieres pagar<\u002Fh2>\n    <p>Tienes dos formas de pagar. Cualquiera de las dos aparta tu lugar y, <b style=\"color:var(--ink)\">en ambos casos, debes enviar tu comprobante por WhatsApp<\u002Fb> para confirmarlo.<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"opciones\">\n\n    <!-- MERCADO PAGO -->\n    <article class=\"opt featured\" id=\"opt-mp\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <div class=\"opt-body\">\n        <div class=\"opt-top\">\n          <div>\n            <div class=\"opt-num\" data-num=\"\"><\u002Fdiv>\n            <img class=\"mp-logo\" src=\"d0efee44-5bb5-4564-9df2-e91efeaa9135\" alt=\"Mercado Pago\">\n            <div class=\"sub\">En línea · acceso inmediato<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"badge-rec\">Recomendada<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"opt-desc\">Dentro de Mercado Pago pagas con <b>tarjeta de débito o crédito, transferencia (SPEI) o efectivo en OXXO<\u002Fb>, de forma rápida y sin necesidad de crear una cuenta.<\u002Fp>\n        <div class=\"pay-btns\">\n          <a class=\"btn btn-mp\" id=\"btnCompleto\" href=\"https://mpago.la/1squPot\" target=\"_blank\" rel=\"noopener\">\n            <span class=\"lbl2\">Pagar completo<\u002Fspan> <span class=\"amt2\" id=\"btnCompletoAmt\">$600 MXN<\u002Fspan>\n            <svg class=\"arrow\" viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <a class=\"btn btn-mp-outline\" id=\"btnApartar\" href=\"https://mpago.la/2oJGPKV\" target=\"_blank\" rel=\"noopener\">\n            <span class=\"lbl2\">Apartar mi lugar<\u002Fspan> <span class=\"amt2\">$200 MXN<\u002Fspan>\n            <svg class=\"arrow\" viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n        <\u002Fdiv>\n        <p class=\"apart-hint\" id=\"apartHint\">Si apartas, pagas los <b>$400 restantes<\u002Fb> el día de inicio del curso.<\u002Fp>\n        <div class=\"info-send\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.4 11.6 12 21a5 5 0 0 1-7-7l8.5-8.5a3.3 3.3 0 0 1 4.7 4.7l-8.5 8.5a1.7 1.7 0 0 1-2.4-2.4l7.8-7.8\"><\u002Fpath><\u002Fsvg>\n          <p>Después de pagar, <b>toma captura y envía tu comprobante por WhatsApp<\u002Fb> para confirmar tu lugar.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"mp-foot\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n          Pago protegido por Mercado Pago\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- BANCOPPEL -->\n    <article class=\"opt\" id=\"opt-bc\">\n      <div class=\"accent-line\" style=\"background:#cfd3e3\"><\u002Fdiv>\n      <div class=\"opt-body\">\n        <div class=\"opt-top\">\n          <div>\n            <div class=\"opt-num\" data-num=\"\"><\u002Fdiv>\n            <h3>Transferencia o depósito<\u002Fh3>\n            <div class=\"sub\">BanCoppel<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"warn\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n          <p>Este pago <b>no es automático.<\u002Fb> Después de pagar, <b>envía tu comprobante por WhatsApp<\u002Fb> para confirmar tu lugar.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"fields\">\n          <div class=\"field\">\n            <div class=\"k\">Titular de la cuenta<\u002Fdiv>\n            <div class=\"v-row\">\n              <span class=\"v titular\">Rafael Luna Sánchez<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"k\">CLABE · transferencia SPEI<\u002Fdiv>\n            <div class=\"v-row\">\n              <span class=\"v mono\" data-copy-src=\"\">137853101108467098<\u002Fspan>\n              <button class=\"copy\" data-copy=\"\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>\n                Copiar\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"k\">No. de cuenta BanCoppel<\u002Fdiv>\n            <div class=\"v-row\">\n              <span class=\"v mono\" data-copy-src=\"\">10110846709<\u002Fspan>\n              <button class=\"copy\" data-copy=\"\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>\n                Copiar\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"k\">No. de tarjeta · depósito en efectivo<\u002Fdiv>\n            <div class=\"v-row\">\n              <span class=\"v mono\" data-copy-src=\"4169160625314407\">4169 1606 2531 4407<\u002Fspan>\n              <button class=\"copy\" data-copy=\"\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>\n                Copiar\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"hint\">Para depósito en efectivo en OXXO o sucursal BanCoppel.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"k\">Concepto / referencia<\u002Fdiv>\n            <div class=\"v-row\">\n              <span class=\"v\" style=\"font-weight:700;font-size:15px;color:var(--ink)\">Tu nombre completo<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"hint\">El nombre de la persona que realiza el pago.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"oxxo-note\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4\"><\u002Fpath><path d=\"M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          <span>El pago en efectivo de Mercado Pago y el depósito en OXXO a esta tarjeta son cosas distintas. Usa solo uno.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n  <\u002Fdiv>\n\n  <!-- COMPLETE RESTO ---------------------------------------------------- -->\n  <div class=\"complete\" id=\"completeSec\">\n    <div class=\"top\">\n      <span class=\"ic\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 8v8\"><\u002Fpath><path d=\"M9 12h6\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fspan>\n      <div>\n        <h3>¿Ya apartaste tu lugar?<\u002Fh3>\n        <p>Si ya pagaste tu anticipo de <b>$200<\u002Fb>, completa aquí los <b>$<span id=\"completeResto\">400<\u002Fspan> restantes<\u002Fb> por Mercado Pago.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a class=\"btn btn-mp\" id=\"btnResto\" href=\"https://mpago.la/21frx5Q\" target=\"_blank\" rel=\"noopener\">\n      <span class=\"lbl2\">Completar mi pago<\u002Fspan> <span class=\"amt2\" id=\"btnRestoAmt\">$400 MXN<\u002Fspan>\n      <svg class=\"arrow\" viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <!-- STEPS ------------------------------------------------------------- -->\n  <div class=\"sec-head\">\n    <div class=\"kicker\">¿Qué sigue?<\u002Fdiv>\n    <h2>Tu acceso en 3 pasos<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\">\n      <span class=\"n\">1<\u002Fspan>\n      <div class=\"st\"><b>Elige tu opción y paga<\u002Fb><span>De forma segura, con el método que prefieras.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <span class=\"n\">2<\u002Fspan>\n      <div class=\"st\"><b>Toma captura de tu comprobante<\u002Fb><span>Guarda el voucher o pantalla de tu pago.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step\">\n      <span class=\"n\">3<\u002Fspan>\n      <div class=\"st\"><b>Envíalo por WhatsApp<\u002Fb><span>Recibe tu acceso al Zoom en vivo y tu constancia.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHATSAPP ---------------------------------------------------------- -->\n  <div class=\"wa-wrap\">\n    <div class=\"wa-card\">\n      <span class=\"wa-ic\">\n        <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.2-.7.1-.2.3-.7 1-.9 1.2-.2.2-.3.2-.6.1-1.6-.8-2.7-1.5-3.7-3.3-.3-.5.3-.5.8-1.5.1-.2 0-.3 0-.5 0-.2-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.1 3.3 5.2 4.6 2 .8 2.7.9 3.7.8.6-.1 1.7-.7 2-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3zM12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <div>\n        <h3>Envía tu comprobante por WhatsApp<\u002Fh3>\n        <p>Responde en el <b>mismo chat de WhatsApp<\u002Fb> por donde llegaste a esta página y manda tu captura. Ahí recibirás tu acceso al Zoom en vivo y tu constancia.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER ------------------------------------------------------------ -->\n  <footer>\n    <div class=\"foot-notes\">\n      <div class=\"foot-note\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10v6M2 10l10-5 10 5-10 5z\"><\u002Fpath><path d=\"M6 12v5c3 3 9 3 12 0v-5\"><\u002Fpath><\u002Fsvg>\n        Al finalizar el curso recibes una <b style=\"color:var(--ink)\">constancia con valor curricular.<\u002Fb>\n      <\u002Fdiv>\n      <div class=\"foot-note\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n        Dirigido a MVZ titulados y estudiantes de veterinaria.\n      <\u002Fdiv>\n      <div class=\"foot-note\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M2 12h20\"><\u002Fpath><path d=\"M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z\"><\u002Fpath><\u002Fsvg>\n        Pagos disponibles únicamente en México.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-brand\">\n      <img src=\"16123008-cc3b-4b50-ba0e-4ddb97f6aaa1\" alt=\"ANIVAKVET\">\n      <small>© 2026 ANIVAKVET<\u002Fsmall>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- TWEAKS ------------------------------------------------------------- -->\n<div id=\"twk\">\n  <div class=\"h\"><b>Tweaks<\u002Fb><button id=\"twk-x\">✕<\u002Fbutton><\u002Fdiv>\n  <div class=\"b\">\n    <div>\n      <label>Orden de los métodos<\u002Flabel>\n      <div class=\"seg\" data-seg=\"orden\">\n        <button data-val=\"mercadopago\">Mercado Pago 1º<\u002Fbutton>\n        <button data-val=\"bancoppel\">BanCoppel 1º<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <label>Acento \"Recomendada\"<\u002Flabel>\n      <div class=\"seg\" data-seg=\"acento\">\n        <button data-val=\"multicolor\">Multicolor<\u002Fbutton>\n        <button data-val=\"azul\">Azul sólido<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  /* ===================================================================\n     CONFIG DE CURSOS — para agregar un curso nuevo, añade una fila aquí.\n     El apartado SIEMPRE es $200 (link fijo APARTADO_LINK abajo).\n     resto = completo - apartado, y se paga el día de inicio.\n     linkResto: link de Mercado Pago para pagar SOLO el resto (opcional).\n     =================================================================== */\n  const APARTADO_LINK = 'https://mpago.la/2oJGPKV';\n  const LINK_COMPLETO_600 = 'https://mpago.la/1squPot'; // también se usa para el resto de $600\n  const LINK_COMPLETO_800 = 'https://mpago.la/1XKJkp4';\n  const LINK_RESTO_400    = 'https://mpago.la/21frx5Q'; // resto de $400 (cursos de $600)\n\n  const CURSOS = {\n    'felinos-silvestres': { nombre:'Felinos Silvestres',                              inicia:'2026-06-15', completo:600, apartado:200, linkCompleto:LINK_COMPLETO_600, linkResto:LINK_RESTO_400 },\n    'hematologia-equina': { nombre:'Hematología Equina',                              inicia:'2026-06-15', completo:600, apartado:200, linkCompleto:LINK_COMPLETO_600, linkResto:LINK_RESTO_400 },\n    'psitacidos':         { nombre:'Medicina y Manejo Clínico de Psitácidos',         inicia:'2026-06-22', completo:600, apartado:200, linkCompleto:LINK_COMPLETO_600, linkResto:LINK_RESTO_400 },\n    'primates':           { nombre:'Medicina de Primates',                            inicia:'2026-07-06', completo:600, apartado:200, linkCompleto:LINK_COMPLETO_600, linkResto:LINK_RESTO_400 },\n    'gastroenterologia':  { nombre:'Gastroenterología Clínica de Pequeñas Especies',  inicia:'2026-07-06', completo:800, apartado:200, linkCompleto:LINK_COMPLETO_800, linkResto:LINK_COMPLETO_600 },\n    'neurologia':         { nombre:'Neurología Clínica de Pequeñas Especies',         inicia:'2026-07-13', completo:800, apartado:200, linkCompleto:LINK_COMPLETO_800, linkResto:LINK_COMPLETO_600 }\n  };\n\n  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];\n  const fmtFecha = iso => { const [y,m,d] = iso.split('-').map(Number); return `${d} de ${MESES[m-1]} de ${y}`; };\n  const hoyCDMX  = () => new Date().toLocaleDateString('en-CA', { timeZone:'America/Mexico_City' }); // YYYY-MM-DD\n  const $ = sel => document.querySelector(sel);\n\n  (function initCurso(){\n    let slug = (new URLSearchParams(location.search).get('curso') || '').trim().toLowerCase();\n    // Modo preview: fuera del dominio real, si no hay ?curso=, muestra un curso de ejemplo\n    // para poder visualizar la página. En producción (anivakvet.pro) NO aplica.\n    const esProduccion = location.hostname.includes('anivakvet.pro');\n    if (!esProduccion){\n      const bar = document.getElementById('previewBar');\n      const sel = document.getElementById('previewSel');\n      sel.innerHTML = Object.keys(CURSOS).map(s =>\n        `<option value=\"${s}\">${CURSOS[s].nombre} — $${CURSOS[s].completo}<\u002Foption>`).join('')\n        + '<option value=\"__none__\">— (sin curso / slug inválido) —<\u002Foption>';\n      bar.style.display = 'flex';\n      sel.addEventListener('change', () => renderCurso(sel.value));\n      if (!slug) slug = 'felinos-silvestres';\n    }\n    renderCurso(slug);\n  })();\n\n  function renderCurso(slug){\n    const sel = document.getElementById('previewSel');\n    if (sel && sel.value !== slug && CURSOS[slug]) sel.value = slug;\n    const curso = CURSOS[slug];\n    const app   = $('#app');\n\n    if (!curso){\n      app.style.display = 'none';\n      buildCursoList();\n      $('#noCurso').style.display = 'flex';\n      return;\n    }\n    $('#noCurso').style.display = 'none';\n\n    const completo = curso.completo;\n    const apartado = curso.apartado;\n    const resto    = completo - apartado;\n    const iniciado = hoyCDMX() >= curso.inicia;\n\n    document.title = 'Pago · ' + curso.nombre + ' · ANIVAKVET';\n    $('#courseName').textContent = curso.nombre;\n    $('#courseDate').innerHTML =\n      '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"3\"/><path d=\"M16 2v4M8 2v4M3 10h18\"/><\u002Fsvg>'\n      + (iniciado ? 'Inició el ' : 'Inicia el ') + fmtFecha(curso.inicia);\n\n    // price card\n    $('#priceAmt').textContent   = completo;\n    $('#splitApart').textContent = apartado;\n    $('#splitResto').textContent = resto;\n\n    // pay buttons\n    $('#btnCompleto').href = curso.linkCompleto;\n    $('#btnCompletoAmt').textContent = '$' + completo + ' MXN';\n    $('#btnApartar').href  = APARTADO_LINK;\n    $('#apartHint').innerHTML = 'Si apartas, pagas los <b>$' + resto + ' restantes<\u002Fb> el día de inicio del curso.';\n\n    app.style.display = '';\n\n    if (iniciado){\n      // curso ya inició → solo pago completo\n      $('#btnApartar').style.display = 'none';\n      $('#apartHint').style.display  = 'none';\n      $('#priceSplit').style.display = 'none';\n      $('#startedFlag').style.display = 'inline-flex';\n    } else {\n      $('#btnApartar').style.display = '';\n      $('#apartHint').style.display  = '';\n      $('#priceSplit').style.display = '';\n      $('#startedFlag').style.display = 'none';\n    }\n\n    // completion section (pagar el resto) — solo si hay link para ese resto\n    if (curso.linkResto){\n      $('#completeSec').style.display = '';\n      $('#btnResto').href = curso.linkResto;\n      $('#completeResto').textContent = resto;\n      $('#btnRestoAmt').textContent = '$' + resto + ' MXN';\n    } else {\n      $('#completeSec').style.display = 'none';\n    }\n  }\n  window.renderCurso = renderCurso;\n\n  function buildCursoList(){\n    const list = document.getElementById('ncList');\n    if (!list || list.dataset.built) return;\n    const arrow = '<span class=\"nc-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"/><path d=\"m13 6 6 6-6 6\"/><\u002Fsvg><\u002Fspan>';\n    list.innerHTML = Object.keys(CURSOS).map(slug => {\n      const c = CURSOS[slug];\n      const iniciado = hoyCDMX() >= c.inicia;\n      const meta = (iniciado ? 'Inició el ' : 'Inicia el ') + fmtFecha(c.inicia);\n      const ini = c.nombre.replace(/^(Medicina y Manejo Clínico de |Medicina de |Gastroenterología |Neurología )/,'').trim().charAt(0).toUpperCase();\n      return `<a class=\"nc-item\" href=\"?curso=${slug}\">\n        <span class=\"nc-mark\">${ini}<\u002Fspan>\n        <span class=\"nc-tx\"><span class=\"nc-nm\">${c.nombre}<\u002Fspan><span class=\"nc-meta\">${meta}<\u002Fspan><\u002Fspan>\n        <span class=\"nc-price\">$${c.completo}<\u002Fspan>${arrow}\n      <\u002Fa>`;\n    }).join('');\n    list.dataset.built = '1';\n  }\n<\u002Fscript>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"orden\": \"mercadopago\",\n    \"acento\": \"azul\"\n  }/*EDITMODE-END*/;\n  let tweaks = { ...TWEAK_DEFAULTS };\n\n  const cont = document.getElementById('opciones');\n  const mp = document.getElementById('opt-mp');\n  const bc = document.getElementById('opt-bc');\n\n  function applyTweaks(){\n    // order\n    if (tweaks.orden === 'bancoppel'){ cont.appendChild(mp); }\n    else { cont.appendChild(bc); }\n    // renumber by visual order\n    [...cont.children].forEach((el,i)=>{\n      const n = el.querySelector('[data-num]');\n      if (n) n.textContent = 'Opción ' + (i+1);\n    });\n    // accent\n    mp.classList.toggle('solid-accent', tweaks.acento === 'azul');\n    // reflect in panel\n    document.querySelectorAll('.seg').forEach(seg=>{\n      const key = seg.getAttribute('data-seg');\n      seg.querySelectorAll('button').forEach(b=>{\n        b.classList.toggle('sel', b.getAttribute('data-val') === tweaks[key]);\n      });\n    });\n  }\n  applyTweaks();\n\n  /* copy to clipboard */\n  document.querySelectorAll('[data-copy]').forEach(btn=>{\n    btn.addEventListener('click', ()=>{\n      const wrap = btn.closest('.v-row');\n      const src = wrap.querySelector('[data-copy-src]');\n      const val = src.getAttribute('data-copy-src') || src.textContent.replace(/\\s/g,'');\n      const finish = ()=>{\n        const orig = btn.innerHTML;\n        btn.classList.add('done');\n        btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg> Copiado';\n        setTimeout(()=>{ btn.classList.remove('done'); btn.innerHTML = orig; }, 1600);\n      };\n      if (navigator.clipboard && navigator.clipboard.writeText){\n        navigator.clipboard.writeText(val).then(finish).catch(()=>fallback(val,finish));\n      } else { fallback(val, finish); }\n    });\n  });\n  function fallback(text, cb){\n    const ta = document.createElement('textarea');\n    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';\n    document.body.appendChild(ta); ta.select();\n    try{ document.execCommand('copy'); }catch(e){}\n    document.body.removeChild(ta); cb();\n  }\n\n  /* tweaks host protocol */\n  const panel = document.getElementById('twk');\n  function setTweak(k,v){\n    tweaks[k]=v; applyTweaks();\n    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{[k]:v} }, '*');\n  }\n  document.querySelectorAll('.seg').forEach(seg=>{\n    const key = seg.getAttribute('data-seg');\n    seg.querySelectorAll('button').forEach(b=>{\n      b.addEventListener('click', ()=> setTweak(key, b.getAttribute('data-val')));\n    });\n  });\n  document.getElementById('twk-x').addEventListener('click', ()=>{\n    panel.classList.remove('on');\n    window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*');\n  });\n  window.addEventListener('message', (e)=>{\n    const t = e?.data?.type;\n    if (t === '__activate_edit_mode') panel.classList.add('on');\n    else if (t === '__deactivate_edit_mode') panel.classList.remove('on');\n  });\n  window.parent.postMessage({ type:'__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
