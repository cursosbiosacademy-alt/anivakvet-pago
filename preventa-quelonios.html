document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

order:#e7e9f1;\n    --navy:#1A1A3E;\n    --gray:#54586f;\n    --gray-soft:#8a8ea3;\n    --mp-blue:#2553d6;\n    --wa:#22a45d;\n    --radius:18px;\n    --rainbow:linear-gradient(90deg,#ff8c00,#7ed321,#00c853,#00b8d4,#1565c0,#e91e8c);\n    --shadow:0 1px 2px rgba(26,26,62,.04), 0 10px 30px rgba(26,26,62,.06);\n    --shadow-lg:0 8px 24px rgba(37,83,214,.28);\n    font-family:'Plus Jakarta Sans',system-ui,sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--bg);color:var(--navy);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{padding-bottom:calc(40px + env(safe-area-inset-bottom))}\n\n  .rainbow-bar{height:5px;width:100%;background:var(--rainbow);position:sticky;top:0;z-index:50}\n\n  .wrap{max-width:460px;margin:0 auto;padding:20px 18px 40px;display:flex;flex-direction:column;gap:18px}\n\n  /* Logo */\n  .logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px}\n  .logo img{width:180px;max-width:58%;height:auto;mix-blend-mode:multiply}\n  .logo .sub{font-size:10.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gray-soft)}\n\n  /* Urgency banner */\n  .urg{align-self:center;display:inline-flex;align-items:center;gap:8px;background:#fff0f4;border:1px solid #fbcfe0;color:#d6336c;font-weight:800;font-size:13px;letter-spacing:.4px;padding:9px 16px;border-radius:999px;text-transform:uppercase;animation:pulse 2.2s ease-in-out infinite}\n  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(214,51,108,.18)}50%{box-shadow:0 0 0 8px rgba(214,51,108,0)}}\n\n  /* Hero */\n  .hero{text-align:center;display:flex;flex-direction:column;gap:11px;margin-top:2px}\n  .kicker{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent}\n  h1{font-size:31px;font-weight:800;line-height:1.14;letter-spacing:-.6px;text-wrap:balance}\n  .level{align-self:center;display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;font-size:11.5px;font-weight:700;letter-spacing:.5px;padding:5px 12px;border-radius:999px;text-transform:uppercase}\n  .lede{font-size:15px;line-height:1.5;color:var(--gray);text-wrap:pretty;padding:0 2px}\n\n  /* Card base */\n  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}\n\n  /* Price hero */\n  .pricebox{padding:22px 18px 24px;text-align:center;display:flex;flex-direction:column;gap:6px;border-top:3px solid transparent;background-image:linear-gradient(#fff,#fff),var(--rainbow);background-origin:border-box;background-clip:padding-box,border-box}\n  .pricebox .tag{font-size:12px;font-weight:700;color:var(--gray-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}\n  .strike{font-size:20px;font-weight:600;color:var(--gray-soft);text-decoration:line-through}\n  .now{display:flex;align-items:baseline;justify-content:center;gap:7px}\n  .now .amount{font-size:64px;font-weight:800;line-height:1;letter-spacing:-2px;background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .now .cur{font-size:19px;font-weight:700;color:var(--gray)}\n  .off{align-self:center;background:#eafaf0;color:#0a8a43;font-weight:800;font-size:13px;padding:6px 14px;border-radius:999px;margin-top:6px}\n  .pricebox .fine{font-size:12.5px;color:var(--gray-soft);margin-top:8px;line-height:1.45;text-wrap:pretty}\n  .pricebox .fine b{color:var(--gray)}\n\n  /* Countdown */\n  .count{padding:16px;text-align:center;display:flex;flex-direction:column;gap:11px}\n  .count .label{font-size:12.5px;font-weight:700;color:var(--gray);display:flex;align-items:center;justify-content:center;gap:6px}\n  .clock{display:flex;justify-content:center;gap:7px}\n  .seg{display:flex;flex-direction:column;align-items:center;gap:5px}\n  .seg b{font-variant-numeric:tabular-nums;font-weight:800;font-size:34px;line-height:1;color:var(--navy);background:#f4f5fa;border:1px solid var(--border);border-radius:11px;padding:9px 11px;min-width:58px}\n  .seg span{font-size:9.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-soft)}\n  .colon{font-weight:800;font-size:28px;color:var(--gray-soft);align-self:flex-start;margin-top:11px}\n\n  /* Section heading */\n  .sec-h{display:flex;align-items:center;gap:10px;margin:6px 2px 0}\n  .sec-h .n{font-size:18px;font-weight:800;letter-spacing:-.3px}\n  .sec-h .ln{flex:1;height:1px;background:var(--border)}\n\n  /* For whom */\n  .whom{padding:20px 18px;display:flex;flex-direction:column;gap:13px}\n  .whom .top{display:flex;align-items:center;gap:12px}\n  .whom .ic{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#fff4e6,#e6fff0);display:grid;place-items:center;font-size:24px;flex:none}\n  .whom h3{font-size:17px;font-weight:800;line-height:1.2}\n  .whom p{font-size:14px;line-height:1.55;color:var(--gray);text-wrap:pretty}\n  .whom p b{color:var(--navy)}\n  .whom .chain{display:flex;align-items:center;gap:8px;background:#f4f5fa;border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:600;color:var(--gray)}\n  .whom .chain .step{color:var(--gray-soft)}\n  .whom .chain .arr{color:var(--mp-blue);font-weight:800}\n  .whom .chain .cur{color:var(--navy);font-weight:700}\n\n  /* Modules */\n  .mods{display:flex;flex-direction:column;gap:10px}\n  .mod{display:flex;gap:13px;align-items:flex-start;padding:15px 16px}\n  .mod .num{flex:none;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;background:var(--navy)}\n  .mod:nth-child(1) .num{background:#ff8c00}\n  .mod:nth-child(2) .num{background:#00c853}\n  .mod:nth-child(3) .num{background:#00b8d4}\n  .mod:nth-child(4) .num{background:#1565c0}\n  .mod:nth-child(5) .num{background:#e91e8c}\n  .mod .body h4{font-size:15px;font-weight:700;line-height:1.25;margin-bottom:3px}\n  .mod .body p{font-size:12.5px;line-height:1.45;color:var(--gray-soft)}\n\n  /* Speaker */\n  .speaker{padding:20px 18px;display:flex;gap:15px;align-items:center}\n  .speaker .av{flex:none;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#1565c0,#00b8d4);display:grid;place-items:center;color:#fff;font-size:24px;font-weight:800;box-shadow:0 6px 16px rgba(21,101,192,.25)}\n  .speaker .meta .role{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-soft);margin-bottom:3px}\n  .speaker .meta .nm{font-size:17px;font-weight:800;line-height:1.2;margin-bottom:4px}\n  .speaker .meta .spec{font-size:13px;line-height:1.45;color:var(--gray)}\n\n  /* Logistics */\n  .logi{padding:6px 4px;display:grid;grid-template-columns:1fr 1fr;gap:10px}\n  .logi .it{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:6px}\n  .logi .it .e{font-size:20px}\n  .logi .it .k{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gray-soft)}\n  .logi .it .v{font-size:14px;font-weight:700;color:var(--navy);line-height:1.3}\n  .logi .it .v small{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-top:2px}\n\n  /* Dates list */\n  .dates{padding:18px;display:flex;flex-direction:column;gap:0}\n  .dates .session{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--border)}\n  .dates .session:first-child{border-top:none}\n  .dates .session .d{flex:none;width:50px;text-align:center;background:#f4f5fa;border:1px solid var(--border);border-radius:10px;padding:6px 0}\n  .dates .session .d .num{font-size:18px;font-weight:800;line-height:1;color:var(--navy)}\n  .dates .session .d .mo{font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gray-soft);margin-top:2px}\n  .dates .session .info .ses{font-size:14px;font-weight:700}\n  .dates .session .info .hr{font-size:12.5px;color:var(--gray-soft);font-weight:600}\n\n  /* Trust */\n  .trust{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n  .trust .b{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:13px;padding:13px;font-size:12.5px;font-weight:600;color:var(--gray);line-height:1.3}\n  .trust .b .e{font-size:18px;flex:none}\n\n  /* Payment heading */\n  .pay-head{text-align:center;display:flex;flex-direction:column;gap:6px;margin-top:4px}\n  .pay-head h2{font-size:22px;font-weight:800;letter-spacing:-.4px}\n  .pay-head p{font-size:13.5px;color:var(--gray);line-height:1.45}\n\n  /* Mercado Pago card */\n  .mp-card{padding:18px;border-top:3px solid transparent;background-image:linear-gradient(#fff,#fff),linear-gradient(90deg,#2553d6,#00a5e0);background-origin:border-box;background-clip:padding-box,border-box}\n  .mp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}\n  .mp-top .reco{background:var(--mp-blue);color:#fff;font-weight:700;font-size:11px;letter-spacing:.3px;padding:6px 11px;border-radius:999px;flex:none}\n  .mp-brand{display:flex;flex-direction:column;gap:5px}\n  .mp-brand img{height:26px;width:auto;align-self:flex-start;mix-blend-mode:multiply}\n  .mp-brand .stat{font-size:13px;font-weight:700;color:#0a8a43;display:flex;align-items:center;gap:6px}\n  .mp-brand .stat::before{content:\"\";width:8px;height:8px;border-radius:50%;background:#11c466;box-shadow:0 0 0 3px rgba(17,196,102,.18)}\n  .mp-desc{font-size:13.5px;line-height:1.5;color:var(--gray);margin-bottom:14px}\n  .mp-desc b{color:var(--navy);font-weight:700}\n  .pay{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--mp-blue);color:#fff;font-weight:700;font-size:18px;text-decoration:none;padding:17px 18px;border-radius:14px;box-shadow:var(--shadow-lg);transition:transform .12s ease,box-shadow .12s ease}\n  .pay .amt{display:flex;align-items:center;gap:9px;white-space:no
